<script>
    // Chapter 66: Management of Patients with Infectious Diseases – exact 32 questions from document
    const questions = [
        {
            id: 1,
            question: "1. A nurse is caring for a child who was admitted to the pediatric unit with infectious diarrhea. The nurse should be alert to what assessment finding as an indicator of dehydration?",
            options: [
                "A. Labile BP",
                "B. Weak pulse",
                "C. Fever",
                "D. Diaphoresis"
            ],
            correct: 1, // B
            rationale: "Assessment of dehydration includes evaluation of thirst, oral mucous membrane dryness, sunken eyes, a weakened pulse, and loss of skin turgor. Diaphoresis, labile BP, and fever are not characteristic signs and symptoms of dehydration. (PTS:1 REF:p.2166)"
        },
        {
            id: 2,
            question: "2. A nursing home resident has been diagnosed with Clostridium difficile. What type of precautions should the nurse implement to prevent the spread of this infectious disease to other residents?",
            options: [
                "A. Contact",
                "B. Droplet",
                "C. Airborne",
                "D. Positive pressure isolation"
            ],
            correct: 0, // A
            rationale: "Contact precautions are used for organisms that are spread by skin-to-skin contact, such as antibiotic-resistant organisms or Clostridium difficile. Droplet precautions are used for organisms that can be transmitted by close, face-to-face contact, such as influenza or meningococcal meningitis. Airborne precautions are required for clients with presumed or proven pulmonary TB or chickenpox. Positive pressure isolation is unnecessary and ineffective. (PTS:1 REF:p.2151)"
        },
        {
            id: 3,
            question: "3. A client has a concentration of S. aureus located on the skin. The client is not showing signs of increased temperature, redness, or pain at the site. The nurse is aware that this is a sign of a microorganism at which of the following stages?",
            options: [
                "A. Infection",
                "B. Colonization",
                "C. Disease",
                "D. Bacteremia"
            ],
            correct: 1, // B
            rationale: "Colonization refers to the presence of microorganisms without host interference or interaction. Infection is a condition in which the host interacts physiologically and immunologically with a microorganism. Disease is the decline in wellness of a host due to infection. Bacteremia is a condition of bacteria in the blood. (PTS:1 REF:p.2148)"
        },
        {
            id: 4,
            question: "4. An infectious outbreak of unknown origin has occurred in a long-term care facility. The nurse who oversees care at the facility should report the outbreak to what organization?",
            options: [
                "A. Centers for Disease Control and Prevention (CDC)",
                "B. American Medical Association (AMA)",
                "C. Environmental Protection Agency (EPA)",
                "D. American Nurses Association (ANA)"
            ],
            correct: 0, // A
            rationale: "The goals of the CDC are to provide scientific recommendations regarding disease prevention and control to reduce disease, which it includes in publications. As such, outbreaks of unknown origin should normally be reported to the CDC. The AMA is the professional organization for medical doctors; the EPA oversees our environment; the ANA is the professional organization for American nurses. (PTS:1 REF:p.2149)"
        },
        {
            id: 5,
            question: "5. The infectious control nurse is presenting a program on West Nile virus for a local community group. To reduce the incidence of this disease, the nurse should recommend what action?",
            options: [
                "A. Covering open wounds at all times",
                "B. Vigilant handwashing in home and work settings",
                "C. Consistent use of mosquito repellents",
                "D. Annual vaccination"
            ],
            correct: 2, // C
            rationale: "West Nile virus is transmitted by mosquitoes, which become infected by biting birds that are infected with the virus. Prevention of mosquito bites can reduce the risk of contracting the disease. Handwashing and bandaging open wounds are appropriate general infection control measures, but these actions do not specifically prevent West Nile virus, for which no vaccine currently exists. (PTS:1 REF:p.2174)"
        },
        {
            id: 6,
            question: "6. An immunosuppressed client is receiving chemotherapy treatment at home. What infection-control measure should the nurse recommend to the family?",
            options: [
                "A. Family members should avoid receiving vaccinations until the client has recovered from his or her illness.",
                "B. Wipe down hard surfaces with a dilute bleach solution once per day.",
                "C. Maintain cleanliness in the home, but recognize that the home does not need to be sterile.",
                "D. Avoid physical contact with the client unless absolutely necessary."
            ],
            correct: 2, // C
            rationale: "When assessing the risk of the immunosuppressed client in the home environment for infection, it is important to realize that intrinsic colonizing bacteria and latent viral infections present a greater risk than do extrinsic environmental contaminants. The nurse should reassure the client and family that their home needs to be clean but not sterile. Common-sense approaches to cleanliness and risk reduction are helpful. The family need not avoid vaccinations, and it is unnecessary to avoid all contact or to wipe down surfaces daily. (PTS:1 REF:p.2158)"
        },
        {
            id: 7,
            question: "7. A medical nurse is careful to adhere to infection control protocols, including handwashing. Which statement about handwashing supports the nurse's practice?",
            options: [
                "A. Frequent handwashing reduces transmission of pathogens from one client to another.",
                "B. Wearing gloves is known to be an adequate substitute for handwashing.",
                "C. Bar soap is preferable to liquid soap.",
                "D. Waterless products should be avoided in situations where running water is unavailable."
            ],
            correct: 0, // A
            rationale: "Whether gloves are worn or not, handwashing is required before and after client contact because thorough handwashing reduces the risk of cross-contamination. Bar soap should not be used because it is a potential carrier of bacteria. Soap dispensers are preferable, but they must also be checked for bacteria. When water is unavailable, the nurse should wash using a liquid hand sanitizer. (PTS:1 REF:p.2154)"
        },
        {
            id: 8,
            question: "8. A male client with gonorrhea asks the nurse how they can reduce the risk of contracting another sexually transmitted infection (STI). The client is not in a monogamous relationship. The nurse should instruct the client to do what action?",
            options: [
                "A. Ask all potential sexual partners if they have an STI.",
                "B. Wear a condom every time the client has intercourse.",
                "C. Consider intercourse to be risk-free if the partner has no visible discharge, lesions, or rashes.",
                "D. Aim to limit the number of sexual partners to fewer than five over their lifetime."
            ],
            correct: 1, // B
            rationale: "Wearing a condom during intercourse considerably reduces the risk of contracting a sexually transmitted infection (STI). The other options may help reduce the risk for contracting an STI, but not to the extent that wearing a condom will. A monogamous relationship reduces the risk of contracting STIs. (PTS:1 REF:p.2170)"
        },
        {
            id: 9,
            question: "9. A client on airborne precautions asks the nurse to leave the door open. What is the nurse's best reply?",
            options: [
                "A. 'I have to keep your door shut at all times. I'll open the curtains so that you don't feel so closed in.'",
                "B. 'I'll keep the door open for you, but please try to avoid moving around the room too much.'",
                "C. 'I can open your door if you wear this mask.'",
                "D. 'I can open your door, but I'll have to come back and close it in a few minutes.'"
            ],
            correct: 0, // A
            rationale: "The nurse is placing the client on airborne precautions, which require that doors and windows be closed at all times. Opening the curtains is acceptable. Clients should be in airborne infection isolation rooms, engineered to provide negative air pressure, rapid turnover of air, and air either highly filtered or exhausted directly to the outside. A closed door maintains the needed negative pressure and controls the spread of the disease that is spread by very small respiratory particles that are suspended as aerosol. Antibiotics, wearing a mask, and standard precautions are not sufficient to allow the client's door to be open. (PTS:1 REF:p.2151)"
        },
        {
            id: 10,
            question: "10. Family members are caring for a client with HIV in the client's home. What should the nurse encourage family members to do to reduce the risk of infection transmission?",
            options: [
                "A. Use caution when shaving the client.",
                "B. Use separate dishes for the client and family members.",
                "C. Use separate bed linens for the client.",
                "D. Disinfect the client's bedclothes regularly."
            ],
            correct: 0, // A
            rationale: "When caring for a client with HIV at home, family members should use caution when providing care that may expose them to the client's blood, such as shaving. Dishes, bed linens, and bedclothes, unless contaminated with blood, only require the usual cleaning. (PTS:1 REF:p.2158)"
        },
        {
            id: 11,
            question: "11. A nurse is preparing to administer a client's scheduled dose of subcutaneous heparin. To reduce the risk of needlestick injury, the nurse should perform which action with used needles?",
            options: [
                "A. For multiple injections, insert the needle into the bed.",
                "B. Recap the needle immediately before leaving the room.",
                "C. Avoid recapping the needle before disposing of it.",
                "D. Wear gloves when administering the injection."
            ],
            correct: 2, // C
            rationale: "Used needles should not be recapped or inserted into the bed even with multiple injections. Recapping of needles is typically done after a medication is drawn up and before injection. Specific steps are used in the process to avoid injury. Used needles are placed directly into puncture-resistant containers near the place where they are used. Gloves do not prevent needlestick injuries. (PTS:1 REF:p.2151)"
        },
        {
            id: 12,
            question: "12. A 16-year-old male client comes to the free clinic and is subsequently diagnosed with primary syphilis. What health problem most likely prompted the client to seek care?",
            options: [
                "A. The emergence of a chancre on his penis",
                "B. Painful urination",
                "C. Signs of a systemic infection",
                "D. Unilateral testicular swelling"
            ],
            correct: 0, // A
            rationale: "Primary syphilis occurs 2 to 3 weeks after initial inoculation with the organism. A painless chancre develops at the site of infection. Initial infection with syphilis is not associated with testicular swelling, painful voiding, or signs of systemic infection. (PTS:1 REF:p.2168)"
        },
        {
            id: 13,
            question: "13. A client on the medical unit is found to have pulmonary tuberculosis (TB). What is the most appropriate precaution for the staff to take to prevent transmission of this disease?",
            options: [
                "A. Standard precautions only",
                "B. Droplet precautions",
                "C. Standard and contact precautions",
                "D. Standard and airborne precautions"
            ],
            correct: 3, // D
            rationale: "Airborne precautions are required for proven or suspected pulmonary TB. Standard precaution techniques are used in conjunction with the transmission-based precautions, regardless of the client's diagnosis. Droplet and contact precautions are insufficient. (PTS:1 REF:p.2151)"
        },
        {
            id: 14,
            question: "14. What is the best rationale for health care providers receiving the influenza vaccination on a yearly basis?",
            options: [
                "A. To decrease nurses' susceptibility to health care–associated infections",
                "B. To decrease risk of transmission to vulnerable clients",
                "C. To eventually eradicate the influenza virus in the United States",
                "D. To prevent the emergence of drug-resistant strains of the influenza virus"
            ],
            correct: 1, // B
            rationale: "To reduce the chance of transmission to vulnerable clients, health care workers are advised to obtain influenza vaccinations. The vaccine will not decrease nurses' risks of developing health care-associated infections, eradicate the influenza virus, or decrease the risk of developing new strains of the influenza virus. (PTS:1 REF:p.2157)"
        },
        {
            id: 15,
            question: "15. A client has presented at the ED with copious diarrhea and accompanying signs of dehydration. During the client's health history, the nurse learns that the client recently ate oysters from the Gulf of Mexico. The nurse should recognize the need to have the client's stool cultured for microorganisms associated with what disease?",
            options: [
                "A. Ebola",
                "B. West Nile virus",
                "C. Legionnaire disease",
                "D. Cholera"
            ],
            correct: 3, // D
            rationale: "In the U.S., cholera should be suspected in clients who have watery diarrhea after eating shellfish harvested from the Gulf of Mexico. (PTS:1 REF:p.2166)"
        },
        {
            id: 16,
            question: "16. A client is alarmed about testing positive for MRSA following culture testing during admission to the hospital. What should the nurse teach the client about this diagnostic finding?",
            options: [
                "A. 'There are promising treatments for MRSA, so this is no cause for serious concern.'",
                "B. 'This doesn't mean that you have an infection; it shows that the bacteria live on one of your skin surfaces.'",
                "C. 'The vast majority of clients in the hospital test positive for MRSA, but the infection doesn't normally cause serious symptoms.'",
                "D. 'This finding is only preliminary, and your doctor will likely order further testing.'"
            ],
            correct: 1, // B
            rationale: "This client's testing results are indicative of colonization, which is not synonymous with infection. The test results are considered reliable, and would not be characterized as 'preliminary.' Treatment is not normally prescribed for colonization. (PTS:1 REF:p.2154)"
        },
        {
            id: 17,
            question: "17. A client's diagnostic testing revealed that the client is colonized with vancomycin-resistant enterococcus (VRE). What change in the client's health status could precipitate an infection?",
            options: [
                "A. Use of a narrow-spectrum antibiotic",
                "B. Treatment of a concurrent infection using vancomycin",
                "C. Development of a skin break",
                "D. Persistent contact of the bacteria with skin surfaces"
            ],
            correct: 2, // C
            rationale: "Colonization can progress to infection if there is a portal of entry by which bacteria can invade body tissues. The use of vancomycin, or any other antibiotic, would not necessarily precipitate a VRE infection. Prolonged skin contact is similarly unlikely to cause infection, provided the skin remains intact. (PTS:1 REF:p.2154)"
        },
        {
            id: 18,

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
